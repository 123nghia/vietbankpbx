services:
  freepbx-microservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freepbx-microservice
    ports:
      - "${SERVICE_PORT:-3000}:${SERVICE_PORT:-3000}"
    environment:
      # FreePBX Configuration
      FREEPBX_HOST: ${FREEPBX_HOST:-192.168.1.9}
      FREEPBX_PORT: ${FREEPBX_PORT:-5060}
      FREEPBX_AMI_HOST: ${FREEPBX_AMI_HOST:-192.168.1.9}
      FREEPBX_AMI_PORT: ${FREEPBX_AMI_PORT:-5038}
      FREEPBX_AMI_USER: ${FREEPBX_AMI_USER:-admin}
      FREEPBX_AMI_PASSWORD: ${FREEPBX_AMI_PASSWORD:-amiadmin}

      # SIP Configuration
      SIP_DOMAIN: ${SIP_DOMAIN:-192.168.1.9}
      SIP_PORT: ${SIP_PORT:-5060}
      SIP_EXTENSION: ${SIP_EXTENSION:-101}
      SIP_PASSWORD: ${SIP_PASSWORD:-extension101}

      # Database Configuration
      DB_SERVER: ${DB_SERVER:-192.168.1.33}
      DB_DATABASE: ${DB_DATABASE:-crmHuman}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_ENCRYPT: ${DB_ENCRYPT:-false}

      # Service Configuration
      SERVICE_PORT: ${SERVICE_PORT:-3000}
      SERVICE_HOST: ${SERVICE_HOST:-0.0.0.0}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Storage
      RECORDING_STORAGE_PATH: ${RECORDING_STORAGE_PATH:-/app/recordings}

      # crmHuman Integration
      CRMHUMAN_API_URL: ${CRMHUMAN_API_URL:-http://192.168.1.33/api}
      CRMHUMAN_API_KEY: ${CRMHUMAN_API_KEY:-your_api_key}

    volumes:
      - ./logs:/app/logs
      - ./recordings:/app/recordings

    restart: unless-stopped

    networks:
      - freepbx-network

networks:
  freepbx-network:
    driver: bridge
