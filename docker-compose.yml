services:
  freepbx-microservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freepbx-microservice
    network_mode: host
    environment:
      FREEPBX_HOST: ${FREEPBX_HOST:-192.168.1.9}

      FREEPBX_AMI_HOST: ${FREEPBX_AMI_HOST:-127.0.0.1}
      FREEPBX_AMI_PORT: ${FREEPBX_AMI_PORT:-5038}
      FREEPBX_AMI_USER: ${FREEPBX_AMI_USER:-admin}
      FREEPBX_AMI_PASSWORD: ${FREEPBX_AMI_PASSWORD:-change_me}
      FREEPBX_AMI_BANNER_TIMEOUT_MS: ${FREEPBX_AMI_BANNER_TIMEOUT_MS:-15000}
      FREEPBX_AMI_REQUIRE_BANNER: ${FREEPBX_AMI_REQUIRE_BANNER:-false}
      FREEPBX_AMI_RECONNECT_DELAY_MS: ${FREEPBX_AMI_RECONNECT_DELAY_MS:-5000}
      FREEPBX_AMI_ACTION_TIMEOUT_MS: ${FREEPBX_AMI_ACTION_TIMEOUT_MS:-10000}

      FREEPBX_CONFIG_FILE: ${FREEPBX_CONFIG_FILE:-/etc/freepbx.conf}
      FREEPBX_RECORDING_ROOT: ${FREEPBX_RECORDING_ROOT:-/var/spool/asterisk/monitor}

      FREEPBX_CDR_DB_HOST: ${FREEPBX_CDR_DB_HOST:-127.0.0.1}
      FREEPBX_CDR_DB_PORT: ${FREEPBX_CDR_DB_PORT:-3306}
      FREEPBX_CDR_DB_NAME: ${FREEPBX_CDR_DB_NAME:-asteriskcdrdb}
      FREEPBX_CDR_DB_USER: ${FREEPBX_CDR_DB_USER:-}
      FREEPBX_CDR_DB_PASSWORD: ${FREEPBX_CDR_DB_PASSWORD:-}
      FREEPBX_CDR_DB_POOL_SIZE: ${FREEPBX_CDR_DB_POOL_SIZE:-10}
      CDR_DEFAULT_LOOKBACK_DAYS: ${CDR_DEFAULT_LOOKBACK_DAYS:-30}
      CDR_MAX_PAGE_SIZE: ${CDR_MAX_PAGE_SIZE:-500}

      FREEPBX_ENDPOINT_TECH: ${FREEPBX_ENDPOINT_TECH:-PJSIP}
      FREEPBX_HINT_CONTEXT: ${FREEPBX_HINT_CONTEXT:-ext-local}
      FREEPBX_DIAL_CONTEXT: ${FREEPBX_DIAL_CONTEXT:-from-internal}
      CALL_ORIGINATE_TIMEOUT_MS: ${CALL_ORIGINATE_TIMEOUT_MS:-30000}
      INTERNAL_EXTENSION_MIN_LENGTH: ${INTERNAL_EXTENSION_MIN_LENGTH:-2}
      INTERNAL_EXTENSION_MAX_LENGTH: ${INTERNAL_EXTENSION_MAX_LENGTH:-6}

      SERVICE_PORT: ${SERVICE_PORT:-3000}
      SERVICE_HOST: ${SERVICE_HOST:-0.0.0.0}
      SERVICE_PUBLIC_URL: ${SERVICE_PUBLIC_URL:-http://192.168.1.9:3000}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUSTED_ADMIN_IPS: ${TRUSTED_ADMIN_IPS:-127.0.0.1,::1,::ffff:127.0.0.1,192.168.1.3,::ffff:192.168.1.3}

      LINE_STORE_PATH: ${LINE_STORE_PATH:-/app/data/managed-lines.json}
      ALLOW_RECORDING_DELETE: ${ALLOW_RECORDING_DELETE:-false}

    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ${FREEPBX_CONFIG_FILE:-/etc/freepbx.conf}:${FREEPBX_CONFIG_FILE:-/etc/freepbx.conf}:ro
      - ${FREEPBX_RECORDING_ROOT:-/var/spool/asterisk/monitor}:${FREEPBX_RECORDING_ROOT:-/var/spool/asterisk/monitor}:ro

    restart: unless-stopped
